<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Music Player</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="player">
    <!-- Header -->
    <div class="header">www.musicplayer.com</div>

    <!-- Vinyl record -->
    <div class="record-container">
      <div class="record" id="record">
        <div class="record-label">🎷</div>
      </div>
    </div>

    <!-- Song info -->
    <div class="song-info">
      <div class="song-title" id="song-title">Song 1</div>
      <div class="song-artist" id="song-artist">Unknown Artist</div>
    </div>

    <!-- Time display -->
    <div class="time-display">
      <span id="current-time">00:00</span> <span class="time-sep">   </span> <span id="total-time">00:00</span>
    </div>

    <!-- Volume control -->
    <div class="volume-control">
      <label for="volume">VOLUME</label>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
    </div>

    <!-- Playback buttons -->
    <div class="controls">
      <button id="prev" aria-label="Previous"><i class="fas fa-step-backward"></i></button>
      <button id="play-pause" aria-label="Play/Pause"><i class="fas fa-play"></i></button>
      <button id="next" aria-label="Next"><i class="fas fa-step-forward"></i></button>
    </div>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <!-- Custom JavaScript -->
  <script src="script.js" defer></script>
</body>
</html>
